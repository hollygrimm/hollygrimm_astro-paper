name: Deploy site via Fleek
on: push
jobs:
  deploy-to-fleek:
    runs-on: ubuntu-latest
    env:
      FLEEK_TOKEN: ${{ secrets.FLEEK_TOKEN }}
      FLEEK_PROJECT_ID: ${{ secrets.FLEEK_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
      - name: Install Fleek CLI
        run: npm i -g @fleekxyz/cli
      - name: Install Packages
        run: npm install
      - name: Build & deploy sites
        run: |
          output=$(fleek sites deploy)
          ipfscid=$(echo "$output" | grep "> Site IPFS CID:" | awk '{print $5}')
          echo "New IPFS CID is: $ipfscid"
      - name: Update IPNS Record with new IPFS CID
        run: fleek ipns publish --name k51qzi5uqu5dk29co17qlb1kzb58fsfv1q0sqfpjc4c8oh6lxldd46s1gp3rnv --hash "$ipfscid"
